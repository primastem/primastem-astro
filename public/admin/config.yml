          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - { name: formTitle, label: Form heading, widget: string }
          - name: contactItems
            label: Contact methods
            widget: list
            fields:
              - { name: label, label: Label (e.g. "Email:"), widget: string }
              - { name: value, label: Display text, widget: string }
              - { name: href, label: Link URL (empty = plain text), widget: string, required: false }
              - { name: external, label: External link (open in new tab), widget: boolean, default: false }

      - name: parents_en
