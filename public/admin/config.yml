backend:
  name: github
  repo: primastem/primastem-astro
  branch: master

media_folder: src/assets
public_folder: /assets

# To add a language: duplicate the _en file entry, change locale suffix and file path.

collections:
  # ── FAQ ──────────────────────────────────────────────────────────────────────
  - name: faq
    label: FAQ
    files:
      - name: faq_en
        label: FAQ (English)
        file: src/content/faq/en.json
        fields:
          - name: items
            label: Questions
            widget: list
            fields:
              - { name: question, label: Question, widget: string }
              - { name: reply, label: Answer, widget: text }
              - name: category
                label: Category
                widget: select
                options:
                  - { label: Product, value: product }
                  - { label: Pricing, value: pricing }
                  - { label: Technical, value: technical }
              - { name: open, label: Open by default, widget: boolean, default: false }

  # ── Pricing ──────────────────────────────────────────────────────────────────
  - name: pricing
    label: Pricing
    files:
      - name: pricing_en
        label: Pricing tiers (English)
        file: src/content/pricing/en.json
        fields:
          - name: items
            label: Tiers
            widget: list
            fields:
              - name: header
                label: Header
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: subtitle, label: Subtitle, widget: string }
                  - { name: currency, label: Currency symbol, widget: string, default: "€" }
                  - { name: price, label: Price (number only), widget: string }
                  - { name: priceLabel, label: Price label, widget: string }
                  - { name: buttonName, label: Button text, widget: string }
                  - { name: buttonLink, label: Button link, widget: string }
              - name: body
                label: Body
                widget: object
                fields:
                  - name: listItems
                    label: Features
                    widget: list
                    fields:
                      - { name: listItem, label: Feature, widget: string }
              - name: type
                label: Style
                widget: select
                options:
                  - { label: Standard, value: basic }
                  - { label: Featured (highlighted), value: featured }

  # ── Product Sheet ─────────────────────────────────────────────────────────────
  - name: product_sheet
    label: Product Sheet
    files:
      - name: product_sheet_en
        label: Product Sheet (English)
        file: src/content/product-sheet/en.md
        fields:
          - { name: body, label: Content, widget: markdown }

  # ── Pages ────────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    files:
      - name: home_en
        label: Homepage (English)
        file: src/content/pages/en/home.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle (HTML allowed), widget: string }
              - { name: price, label: Price line, widget: string }
              - { name: volumeLine, label: Volume line (HTML allowed), widget: string }
              - { name: buttonText, label: Button text, widget: string }
              - { name: buttonLink, label: Button link, widget: string }
          - name: twoLevels
            label: Two levels section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - name: level1
                label: Level 1 (Ages 4-7)
                widget: object
                fields:
                  - { name: tag, label: Tag (e.g. "Logic, Numbers"), widget: string }
                  - { name: age, label: Age range, widget: string }
                  - { name: items, label: Bullet items, widget: list, field: { name: item, label: Item, widget: string } }
              - name: level2
                label: Level 2 (Ages 7-10)
                widget: object
                fields:
                  - { name: tag, label: Tag, widget: string }
                  - { name: age, label: Age range, widget: string }
                  - { name: items, label: Bullet items, widget: list, field: { name: item, label: Item, widget: string } }
          - name: drawing
            label: Drawing section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle (HTML allowed), widget: string }
              - name: drawings
                label: Drawing names (image map is fixed in code)
                widget: list
                fields:
                  - { name: name, label: Name (Pentagon/Star/Spiral/Heart), widget: string }
              - { name: example, label: Example caption, widget: string }
          - name: maps
            label: Maps section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Body text, widget: text }
          - name: video
            label: Video section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: videoUrl, label: YouTube embed URL, widget: string }
              - { name: videoCaption, label: Video caption, widget: string }
          - name: trust
            label: Trust section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: countriesLine, label: Countries line, widget: string }
          - name: newsletter
            label: Newsletter section
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: formId, label: Mailerlite form ID, widget: string }
          - name: tagline
            label: Tagline section
            widget: object
            fields:
              - { name: blockquote, label: Quote (HTML allowed), widget: text }
              - { name: figcaption, label: Figcaption (e.g. "PrimaSTEM"), widget: string }
              - { name: cite, label: Cite (e.g. "Made in..."), widget: string }

      - name: legal_en
        label: Legal Notice (English)
        file: src/content/pages/en/legal.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }

