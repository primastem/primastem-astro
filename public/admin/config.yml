              - { name: subtitle, label: Subtitle, widget: string, i18n: true }
              - { name: formId, label: Mailerlite form ID, widget: string, i18n: duplicate }
          - name: tagline
            label: Tagline section
            widget: object
            i18n: true
            fields:
              - { name: blockquote, label: Quote (HTML allowed), widget: text, i18n: true }
              - { name: figcaption, label: Figcaption (e.g. "PrimaSTEM"), widget: string, i18n: true }
              - { name: cite, label: Cite (e.g. "Made in..."), widget: string, i18n: true }

