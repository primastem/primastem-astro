backend:
  name: github
  repo: primastem/primastem-astro
  branch: master

media_folder: src/assets
public_folder: /assets

locale: en

# To add a language: duplicate the _en file entry, change locale suffix and file path.

collections:
  # ── FAQ ──────────────────────────────────────────────────────────────────────
  - name: faq
    label: FAQ
    files:
      - name: faq_en
        label: FAQ (English)
        file: src/data/faq/en.json
        fields:
          - name: items
            label: Questions
            widget: list
            fields:
              - { name: question, label: Question, widget: string }
              - { name: reply, label: Answer, widget: text }
              - name: category
                label: Category
                widget: select
                options:
                  - { label: Product, value: product }
                  - { label: Pricing, value: pricing }
                  - { label: Technical, value: technical }
              - { name: open, label: Open by default, widget: boolean, default: false }

  # ── Pricing ──────────────────────────────────────────────────────────────────
  - name: pricing
    label: Pricing
    files:
      - name: pricing_en
        label: Pricing tiers (English)
        file: src/data/pricing/en.json
        fields:
          - name: items
            label: Tiers
            widget: list
            fields:
              - name: header
                label: Header
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: subtitle, label: Subtitle, widget: string }
                  - { name: currency, label: Currency symbol, widget: string, default: "€" }
                  - { name: price, label: Price (number only), widget: string }
                  - { name: priceLabel, label: Price label, widget: string }
                  - { name: buttonName, label: Button text, widget: string }
                  - { name: buttonLink, label: Button link, widget: string }
              - name: body
                label: Body
                widget: object
                fields:
                  - name: listItems
                    label: Features
                    widget: list
                    fields:
                      - { name: listItem, label: Feature, widget: string }
              - name: type
                label: Style
                widget: select
                options:
                  - { label: Standard, value: basic }
                  - { label: Featured (highlighted), value: featured }

  # ── Product Sheet ─────────────────────────────────────────────────────────────
  - name: product_sheet
    label: Product Sheet
    files:
      - name: product_sheet_en
        label: Product Sheet (English)
        file: src/content/product-sheet.md
        fields:
          - { name: body, label: Content, widget: markdown }

  # ── Pages ────────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    files:
      - name: legal_en
        label: Legal Notice (English)
        file: src/content/pages/legal.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }

      - name: privacy_en
        label: Privacy Policy (English)
        file: src/content/pages/privacy.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }

      - name: about_en
        label: About (English)
        file: src/content/pages/about.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }

      - name: contact_en
        label: Contact (English)
        file: src/content/pages/contact.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: text, label: Subtitle, widget: string }
          - { name: formTitle, label: Form heading, widget: string }
          - name: contactItems
            label: Contact methods
            widget: list
            fields:
              - { name: label, label: Label (e.g. "Email:"), widget: string }
              - { name: value, label: Display text, widget: string }
              - { name: href, label: Link URL (empty = plain text), widget: string, required: false }
              - { name: external, label: External link (open in new tab), widget: boolean, default: false }

      - name: parents_en
        label: Parents (English)
        file: src/content/pages/parents.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: price, label: Price line, widget: string }
              - { name: buttonText, label: Button text, widget: string }
              - { name: buttonLink, label: Button link, widget: string }
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }
          - name: cta
            label: Bottom CTA
            widget: object
            fields:
              - { name: title, label: CTA title (HTML allowed), widget: string }
              - { name: subtitle, label: CTA subtitle, widget: string }
              - { name: buttonText, label: Button text, widget: string }

      - name: distributors_en
        label: Distributors (English)
        file: src/content/pages/distributors.json
        fields:
          - name: seo
            label: SEO
            widget: object
            fields:
              - { name: title, label: Page title, widget: string }
              - { name: description, label: Meta description, widget: text }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: title, label: Title (HTML allowed), widget: string }
              - { name: subtitle1, label: Subtitle line 1, widget: string }
              - { name: subtitle2, label: Subtitle line 2, widget: string }
              - { name: price, label: Price line, widget: string }
              - { name: volumeLine, label: Volume line (HTML allowed), widget: string }
              - name: buttons
                label: Buttons
                widget: list
                fields:
                  - { name: text, label: Button text, widget: string }
                  - { name: link, label: Button link, widget: string }
                  - name: style
                    label: Button style
                    widget: select
                    options: [primary, secondary, neutral]
          - name: sections
            label: Sections
            widget: list
            fields:
              - { name: sidebarTitle, label: Sidebar heading, widget: string }
              - { name: sidebarText, label: Sidebar description, widget: string, required: false }
              - { name: body, label: Body content (markdown), widget: markdown }
          - name: cta
            label: Bottom CTA
            widget: object
            fields:
              - { name: title, label: CTA title (HTML allowed), widget: string }
              - { name: subtitle, label: CTA subtitle, widget: string, required: false }
              - { name: buttonText, label: Button text, widget: string }
