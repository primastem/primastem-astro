backend:
  name: github
  repo: primastem/primastem-astro
  branch: master
  base_url: https://sveltia-cms-auth.chanov.workers.dev

media_folder: src/assets
public_folder: /assets

i18n:
  locales: [en, fr, de, es, ru]
  default_locale: en

collections:
  # ── FAQ ──────────────────────────────────────────────────────────────────────
  - name: faq
    label: FAQ
    i18n: true
    files:
      - name: faq
        label: FAQ
        file: src/content/faq/{{locale}}.json
        i18n: true
        fields:
          - name: items
            label: Questions
            widget: list
            i18n: true
            fields:
              - { name: question, label: Question, widget: string, i18n: true }
              - { name: reply, label: Answer, widget: text, i18n: true }
              - name: category
                label: Category
                widget: select
                i18n: true
                options:
                  - { label: Product, value: product }
                  - { label: Pricing, value: pricing }
                  - { label: Technical, value: technical }
              - { name: open, label: Open by default, widget: boolean, default: false, i18n: duplicate }

  # ── Pricing ──────────────────────────────────────────────────────────────────
  - name: pricing
    label: Pricing
    i18n: true
    files:
      - name: pricing
        label: Pricing tiers
        file: src/content/pricing/{{locale}}.json
        i18n: true
        fields:
          - { name: sectionTitle, label: Section title, widget: string, i18n: true }
          - { name: sectionSubtitle, label: Section subtitle, widget: string, i18n: true }
          - name: items
            label: Tiers
            widget: list
            i18n: true
            fields:
              - name: header
                label: Header
                widget: object
                i18n: true
                fields:
                  - { name: title, label: Title, widget: string, i18n: true }
                  - { name: subtitle, label: Subtitle, widget: string, i18n: true }
                  - { name: currency, label: Currency symbol, widget: string, default: "€", i18n: duplicate }
                  - { name: price, label: Price (number only), widget: string, i18n: true }
                  - { name: priceLabel, label: Price label, widget: string, i18n: true }
                  - { name: buttonName, label: Button text, widget: string, i18n: true }
                  - { name: buttonLink, label: Button link, widget: string, i18n: duplicate }
              - name: body
                label: Body
                widget: object
                i18n: true
                fields:
                  - name: listItems
                    label: Features
                    widget: list
                    i18n: true
                    fields:
                      - { name: listItem, label: Feature, widget: string, i18n: true }
              - name: type
                label: Style
                widget: select
                i18n: true
                options:
                  - { label: Standard, value: basic }
                  - { label: Featured (highlighted), value: featured }

  # ── Product Sheet ─────────────────────────────────────────────────────────────
  - name: product_sheet
    label: Product Sheet
    i18n: true
    files:
      - name: product_sheet
        label: Product Sheet
        file: src/content/product-sheet/{{locale}}.md
        i18n: true
        fields:
          - { name: body, label: Content, widget: markdown, i18n: true }

  # ── Pages ────────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    i18n: true
    files:
      - name: home
        label: Homepage
        file: src/content/pages/{{locale}}/home.json
        i18n: true
        fields:
          - name: seo
            label: SEO
            widget: object
            i18n: true
            fields:
              - { name: title, label: Page title, widget: string, i18n: true }
              - { name: description, label: Meta description, widget: text, i18n: true }
          - name: hero
            label: Hero
            widget: object
            i18n: true
            fields:
              - { name: title, label: Title (HTML allowed), widget: string, i18n: true }
              - { name: subtitle, label: Subtitle (HTML allowed), widget: string, i18n: true }
              - { name: price, label: Price line, widget: string, i18n: true }
              - { name: volumeLine, label: Volume line (HTML allowed), widget: string, i18n: true }
              - { name: buttonText, label: Button text, widget: string, i18n: true }
              - { name: buttonLink, label: Button link, widget: string, i18n: duplicate }
          - name: twoLevels
            label: Two levels section
            widget: object
            i18n: true
            fields:
              - { name: title, label: Title (HTML allowed), widget: string, i18n: true }
              - { name: subtitle, label: Subtitle, widget: string, i18n: true }
              - name: level1
                label: Level 1 (Ages 4-7)
                widget: object
                i18n: true
                fields:
                  - { name: tag, label: Tag (e.g. "Logic, Numbers"), widget: string, i18n: true }
                  - { name: age, label: Age range, widget: string, i18n: true }
                  - { name: items, label: Bullet items, widget: list, field: { name: item, label: Item, widget: string, i18n: true } }
              - name: level2
                label: Level 2 (Ages 7-10)
                widget: object
                i18n: true
                fields:
                  - { name: tag, label: Tag, widget: string, i18n: true }
                  - { name: age, label: Age range, widget: string, i18n: true }
                  - { name: items, label: Bullet items, widget: list, field: { name: item, label: Item, widget: string, i18n: true } }
          - name: drawing
            label: Drawing section
            widget: object
            i18n: true
            fields:
              - { name: title, label: Title (HTML allowed), widget: string, i18n: true }
              - { name: subtitle, label: Subtitle (HTML allowed), widget: string, i18n: true }
              - name: drawings
                label: Drawing names (image map is fixed in code)
                widget: list
                i18n: true
                fields:
                  - { name: name, label: Name (Pentagon/Star/Spiral/Heart), widget: string, i18n: true }
              - { name: example, label: Example caption, widget: string, i18n: true }
          - name: maps
            label: Maps section
            widget: object
            i18n: true
            fields:
              - { name: title, label: Title (HTML allowed), widget: string, i18n: true }
              - { name: text, label: Body text, widget: text, i18n: true }
          - name: video
            label: Video section
            widget: object
            i18n: true
            fields:
              - { name: title, label: Title (HTML allowed), widget: string, i18n: true }
              - { name: subtitle, label: Subtitle, widget: string, i18n: true }
              - { name: videoUrl, label: YouTube embed URL, widget: string, i18n: duplicate }
              - { name: videoCaption, label: Video caption, widget: string, i18n: true }
          - name: trust
